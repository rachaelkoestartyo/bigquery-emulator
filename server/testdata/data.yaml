projects:
- id: test
  datasets:
    - id: dataset1
      tables:
        - id: table_a
          columns:
            - name: id
              type: INTEGER
              mode: REQUIRED
            - name: name
              type: STRING
              mode: required # lower case
            - name: structarr
              type: STRUCT
              mode: repeated
              fields:
                - name: key
                  type: STRING
                - name: value
                  type: JSON
            - name: birthday
              type: DATETIME
            - name: skillNum
              type: NUMERIC
            - name: created_at
              type: TIMESTAMP
            - name: age
              type: INT64
            - name: birth_date
              type: DATE
            - name: wake_time
              type: TIME
            - name: score
              type: FLOAT
            - name: active
              type: BOOLEAN
            - name: metadata
              type: JSON
          data:
            - id: 1
              name: alice
              structarr:
                - key: profile
                  value: '{"age": 10}'
              birthday: "2012-01-01"
              skillNum: 3
